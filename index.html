<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; worker-src 'self';">
    
    <title>Conversor Universal JSON x CSV</title>
    <meta name="description" content="Converta arquivos JSON complexos para planilhas CSV de forma rápida e segura, rodando 100% no seu navegador.">
    <meta property="og:title" content="Conversor Universal JSON x CSV">
    <meta property="og:description" content="Ferramenta gratuita que roda localmente para converter payloads JSON em arquivos CSV estruturados.">
    <meta property="og:type" content="website">
    
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#4F46E5">

    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <div class="container">
        <h1>Conversor JSON x CSV</h1>
        <p class="subtitle">Cole seu JSON abaixo para gerar o relatório CSV.</p>

        <div class="input-group">
            <label for="jsonInput">JSON:</label>
            <textarea id="jsonInput" placeholder='Exemplo: { "dados": [ {"id": 1, "nome": "João"} ] }'></textarea>
        </div>

        <button id="convertBtn" disabled>⚙️ Converter para CSV</button>
        <div id="errorMsg" class="error-message"></div>

        <div id="outputSection">
            <div class="input-group">
                <label for="csvOutput">Resultado (Pré-visualização)</label>
                <textarea id="csvOutput" readonly></textarea>
            </div>
            
            <div class="input-group">
                <label for="fileNameInput">Nome do Arquivo de Saída</label>
                <input type="text" id="fileNameInput" placeholder="Ex: relatorio_vendas (Opcional)">
            </div>

            <div class="button-group">
                <button id="downloadBtn" class="btn-success">⬇️ Baixar Arquivo</button>
                <button id="copyBtn" class="btn-secondary">📋 Copiar Texto</button>
            </div>
        </div>
    </div>

    <script type="module" src="./js/app.js"></script>
</body>
</html>
